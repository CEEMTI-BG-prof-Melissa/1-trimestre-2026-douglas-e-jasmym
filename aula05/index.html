<html lang="pt-Br">
    <head> 
        <meta charset="UTF-8">
        <title>Prática 05</title>

    <body>
        <h1>Cadastro</h1>
        <form action="index.html" method="post">
            <label for="nome">Nome: </label>
            <input type="text" id="nome" Name="nome"> <br> <br>
            <label for="E-mail">E-mail: </label> 
            <input type="text" id="E-mail" E-mail="E-mail"> <br> <br>
            <label for="senha"> Senha: </label>
            <input type="text"  id="senha" Senha="senha"> <br> <br>
            <label for="idade">Idade: </label>
            <input type="text" id="idade" Idade="idade"> <br> <br>
            <label for="dn"> Data de Nascimento: </label>
            <input type="date" id="dn" Data de Nascimento> <br> <br> 
            <input type="submit" value="Cadastrar"> 
            <input type="reset" value="Enviar"> 
        </form>
